<!-- frontend/pages/register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - LOHAN</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --bg2: #111827;
      --bg3: #1f2937;
      --text: #f9fafb;
      --text2: #d1d5db;
      --muted: #6b7280;
      --accent: #10b981;
      --accent-dim: rgba(16, 185, 129, 0.1);
      --red: #ef4444;
      --border: rgba(255,255,255,0.1);
      --gradient: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    nav {
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
    }
    
    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .auth-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    
    .auth-logo {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    
    .auth-sub {
      text-align: center;
      color: var(--muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    
    .form-group {
      margin-bottom: 1.25rem;
    }
    
    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }
    
    .form-input, .form-select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.875rem 1rem;
      color: var(--text);
      font-size: 0.95rem;
      transition: all 0.3s;
    }
    
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    
    .form-input::placeholder {
      color: var(--muted);
    }
    
    .form-select option {
      background: var(--bg2);
    }
    
    .btn-full {
      width: 100%;
      background: var(--gradient);
      border: none;
      color: white;
      padding: 1rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 0.5rem;
    }
    
    .btn-full:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
    }
    
    .btn-full:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .terms {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 1.5rem;
      line-height: 1.5;
    }
    
    .auth-switch {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 1rem;
    }
    
    .auth-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    
    .auth-link:hover {
      text-decoration: underline;
    }
    
    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--red);
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }
    
    .error-msg.show { display: block; }
    
    @media (max-width: 640px) {
      .form-row { grid-template-columns: 1fr; }
      .auth-card { padding: 2rem; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo" onclick="window.location.href='/'">LOHAN</div>
    <a href="/" class="auth-link">← Back to Home</a>
  </nav>
  
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">LOHAN</div>
      <div class="auth-sub">Create your free trading account in 60 seconds</div>
      
      <div class="error-msg" id="error-msg"></div>
      
      <form id="register-form">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">FIRST NAME</label>
            <input type="text" class="form-input" id="firstName" placeholder="John" required>
          </div>
          <div class="form-group">
            <label class="form-label">LAST NAME</label>
            <input type="text" class="form-input" id="lastName" placeholder="Doe" required>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">EMAIL ADDRESS</label>
          <input type="email" class="form-input" id="email" placeholder="john@example.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">PHONE (M-PESA NUMBER)</label>
          <input type="tel" class="form-input" id="phone" placeholder="+254 7XX XXX XXX" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">COUNTRY</label>
          <select class="form-select" id="country">
            <option value="Kenya">Kenya</option>
            <option value="Uganda">Uganda</option>
            <option value="Tanzania">Tanzania</option>
            <option value="Nigeria">Nigeria</option>
            <option value="Ghana">Ghana</option>
            <option value="South Africa">South Africa</option>
          </select>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">PASSWORD</label>
            <input type="password" class="form-input" id="password" placeholder="Min 8 chars" minlength="6" required>
          </div>
          <div class="form-group">
            <label class="form-label">CONFIRM PASSWORD</label>
            <input type="password" class="form-input" id="confirmPassword" placeholder="Repeat" required>
          </div>
        </div>
        
        <button type="submit" class="btn-full" id="submit-btn">Create Account — It's Free</button>
      </form>
      
      <div class="terms">
        By registering, you agree to our Terms of Service and Risk Disclosure. Trading binary options carries substantial risk.
      </div>
      
      <div class="auth-switch">
        Already have an account? <a href="/pages/login.html" class="auth-link">Sign in</a>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    // Check if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = '/pages/dashboard.html';
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-msg');
      
      // Validation
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match';
        errorMsg.classList.add('show');
        return;
      }
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';
      errorMsg.classList.remove('show');
      
      try {
        const response = await api.register({
          firstName: document.getElementById('firstName').value,
          lastName: document.getElementById('lastName').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
          country: document.getElementById('country').value,
          password: password
        });
        
        if (response.success) {
          localStorage.setItem('token', response.token);
          localStorage.setItem('user', JSON.stringify(response.user));
          window.location.href = '/pages/dashboard.html';
        }
      } catch (error) {
        errorMsg.textContent = error.message || 'Registration failed. Please try again.';
        errorMsg.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account — It\'s Free';
      }
    });
  </script>
</body>
</html>
